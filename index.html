<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>鶏やま 最強シフト入力</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { font-family: sans-serif; padding: 15px; text-align: center; background: #fdf5e6; color: #333; }
    h2 { color: #d32f2f; margin-bottom: 5px; }
    #calendar-inline { margin: 0 auto 15px auto; }
    
    /* 🕒 4択ボタンのエリア */
    .pattern-container { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .pattern-title { font-size: 14px; font-weight: bold; color: #777; margin-bottom: 10px; display: block; }
    .pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .pattern-btn { 
      background: #f9f9f9; border: 2px solid #eee; border-radius: 10px; padding: 15px 5px;
      font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .pattern-btn.active { background: #fff3e0; border-color: #ff9800; color: #e65100; box-shadow: 0 0 10px rgba(255,152,0,0.2); }
    
    /* ⚙️ カスタム入力エリア（通常は隠しておくor控えめに） */
    .custom-area { font-size: 12px; color: #999; margin-bottom: 15px; }
    .custom-area input { border: none; background: transparent; font-weight: bold; color: #333; width: 50px; text-align: center; font-size: 14px; }

    #btn-submit { background: #4caf50; color: white; border: none; padding: 18px; font-size: 20px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(76,175,80,0.3); }
  </style>
</head>
<body>
  <h2>🐔 鶏やま シフト入力</h2>
  <div id="calendar-inline"></div>

  <div class="pattern-container">
    <span class="pattern-title">⏰ 定番の時間帯をタップ！</span>
    <div class="pattern-grid">
      <button class="pattern-btn" onclick="apply('17:00','22:00',this)">17:00 〜 22:00</button>
      <button class="pattern-btn" onclick="apply('17:00','23:00',this)">17:00 〜 23:00</button>
      <button class="pattern-btn" onclick="apply('15:00','23:00',this)">15:00 〜 23:00</button>
      <button class="pattern-btn" onclick="apply('13:00','24:00',this)">13:00 〜 24:00</button>
    </div>
  </div>

  <div class="custom-area">
    選択中：<input type="text" id="start" value="17:00" readonly> 〜 <input type="text" id="end" value="22:00" readonly>
    <br>(変更したい時はボタンを押し直してね)
  </div>

  <button id="btn-submit">これで登録するペン！🐧🔥</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script>
    const LIFF_ID = "2009333479-SgIRcYL0";
    const fp = flatpickr("#calendar-inline", { inline: true, mode: "multiple", locale: "ja", dateFormat: "m月d日", minDate: "today" });

    function apply(s, e, btn) {
      document.getElementById('start').value = s;
      document.getElementById('end').value = e;
      document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    liff.init({ liffId: LIFF_ID }).then(() => { if (!liff.isLoggedIn()) liff.login(); });

    document.getElementById("btn-submit").addEventListener("click", () => {
      const dates = fp.selectedDates.sort((a,b)=>a-b).map(d => (d.getMonth()+1) + "月" + d.getDate() + "日").join(", ");
      const startTime = document.getElementById("start").value;
      const endTime = document.getElementById("end").value;
      if (!dates) return alert("日付を選んでね！");
      const msg = "【一括シフト希望】\n📅 " + dates + "\n⏰ " + startTime + "〜" + endTime;
      liff.sendMessages([{ type: "text", text: msg }]).then(() => liff.closeWindow());
    });
  </script>
</body>
</html>
