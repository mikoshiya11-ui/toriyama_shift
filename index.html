<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>鶏やま 最強シフト入力</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { font-family: sans-serif; padding: 15px; text-align: center; background: #fdf5e6; color: #333; }
    h2 { color: #d32f2f; margin-bottom: 5px; }
    #calendar-inline { margin: 0 auto 15px auto; }
    .pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .pattern-btn { 
      background: white; border: 2px solid #ddd; border-radius: 10px; padding: 12px 5px;
      font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .pattern-btn.active { background: #fff3e0; border-color: #ff9800; color: #e65100; box-shadow: 0 0 10px rgba(255,152,0,0.3); }
    .custom-time { background: white; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
    input[type="text"] { width: 80px; border: 1px solid #ccc; border-radius: 5px; padding: 8px; text-align: center; font-size: 16px; font-weight: bold; background: #f9f9f9; }
    #btn-submit { background: #4caf50; color: white; border: none; padding: 18px; font-size: 20px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(76,175,80,0.3); }
  </style>
</head>
<body>
  <h2>🐔 鶏やま シフト入力</h2>
  <div id="calendar-inline"></div>

  <p style="font-size:13px; font-weight:bold; margin-bottom:8px;">⏰ 時間帯を選んでね！</p>
  <div class="pattern-grid">
    <button class="pattern-btn" onclick="setTime('17:00','22:00',this)">17:00〜22:00</button>
    <button class="pattern-btn" onclick="setTime('17:00','23:00',this)">17:00〜23:00</button>
    <button class="pattern-btn" onclick="setTime('15:00','23:00',this)">15:00〜23:00</button>
    <button class="pattern-btn" onclick="setTime('13:00','24:00',this)">13:00〜24:00</button>
  </div>

  <div class="custom-time">
    <span style="font-size:12px; color:#666;">その他の時間：</span>
    <input type="text" id="start" value="17:00" readonly> 〜 <input type="text" id="end" value="22:00" readonly>
  </div>

  <button id="btn-submit">これで登録するペン！🐧🔥</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script>
    const LIFF_ID = "2009333479-SgIRcYL0";
    const fp = flatpickr("#calendar-inline", { inline: true, mode: "multiple", locale: "ja", dateFormat: "m月d日", minDate: "today" });
    
    // 🕒 予備の時計（円盤は絶対出さない！）
    const tConfig = { noCalendar: true, enableTime: true, time_24hr: true, locale: "ja", dateFormat: "H:i", minuteIncrement: 15, disableMobile: true };
    const sp = flatpickr("#start", tConfig);
    const ep = flatpickr("#end", tConfig);

    function setTime(s, e, btn) {
      sp.setDate(s); ep.setDate(e);
      document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    liff.init({ liffId: LIFF_ID }).then(() => { if (!liff.isLoggedIn()) liff.login(); });

    document.getElementById("btn-submit").addEventListener("click", () => {
      const dates = fp.selectedDates.sort((a,b)=>a-b).map(d => (d.getMonth()+1) + "月" + d.getDate() + "日").join(", ");
      const startTime = document.getElementById("start").value;
      const endTime = document.getElementById("end").value;
      if (!dates) return alert("日付を選んでね！");
      const msg = "【一括シフト希望】\n📅 " + dates + "\n⏰ " + startTime + "〜" + endTime;
      liff.sendMessages([{ type: "text", text: msg }]).then(() => liff.closeWindow());
    });
  </script>
</body>
</html>
