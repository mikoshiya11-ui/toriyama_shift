<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>鶏やま 最強シフト入力</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #fdf5e6; }
    h2 { color: #d32f2f; }
    .input-group { margin-bottom: 15px; text-align: left; background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    label { font-size: 14px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
    input[type="time"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    #calendar-inline { margin: 0 auto 20px auto; }
    #btn-submit {
      background: #4caf50; color: white; border: none; padding: 15px 30px;
      font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>🐔 鶏やま シフト入力</h2>
  
  <div id="calendar-inline"></div>

  <div class="input-group">
    <label>⏰ 開始時刻</label>
    <input type="time" id="startTime" value="17:00">
  </div>
  <div class="input-group">
    <label>⏰ 終了時刻</label>
    <input type="time" id="endTime" value="22:00">
  </div>

  <button id="btn-submit">この内容で登録！✨</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
  <script>
    const LIFF_ID = "2009333479-SgIRcYL0";

    const fp = flatpickr("#calendar-inline", {
      inline: true, mode: "multiple", locale: "ja", dateFormat: "m月d日", minDate: "today"
    });

    liff.init({ liffId: LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) { liff.login(); }
    }).catch(err => alert("起動エラー: " + err));

    document.getElementById("btn-submit").addEventListener("click", () => {
      const selectedDates = fp.selectedDates
        .sort((a, b) => a - b)
        .map(d => (d.getMonth() + 1) + "月" + d.getDate() + "日")
        .join(", ");

      const start = document.getElementById("startTime").value;
      const end = document.getElementById("endTime").value;

      if (!selectedDates) { alert("日付を選んでね！"); return; }

      const message = "【一括シフト希望】\n📅 " + selectedDates + "\n⏰ " + start + "〜" + end;

      liff.sendMessages([{ type: "text", text: message }]).then(() => {
        liff.closeWindow();
      }).catch(err => alert("送信失敗: " + err));
    });
  </script>
</body>
</html>
